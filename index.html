<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Finding the Gradient</title>
  <style>
    :root {
      --top-bar-bg: #34495e; --bottom-bar-bg: #2c3e50; --page-bg: #f7f4e9;
      --card-bg: #ffffff; --card-border: #1f7ed0; --text-main: #1f2933; --text-muted: #ecf0f1;
      --pill-blue: #3498db; --pill-green: #27ae60; --pill-red: #e74c3c;
      --toolbar-icon-bg: #f1c40f; --toolbar-icon-border: #e0a708;
      --shadow-soft: 0 6px 18px rgba(0,0,0,0.12); --radius-card: 18px; --radius-pill: 999px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--page-bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
    .top-bar { background: var(--top-bar-bg); color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; font-size: 15px; }
    .top-left { display: flex; flex-direction: column; gap: 6px; }
    .meta-row { display: flex; align-items: baseline; gap: 6px; }
    .meta-label { font-weight: 600; opacity: 0.9; }
    .meta-value { border-bottom: 2px solid rgba(236,240,241,0.7); padding-bottom: 2px; font-weight: 500; }
    .top-right { display: flex; align-items: center; gap: 18px; font-weight: 500; }
    .page-info { white-space: nowrap; }
    .slide-select-wrapper { position: relative; }
    .slide-select { padding: 6px 28px 6px 10px; border-radius: 6px; border: none; font-size: 13px; font-weight: 500; outline: none; background: #fff; color: #333; appearance: none; }
    .slide-select-wrapper::after { content: "▾"; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; pointer-events: none; color: #555; }
    .content { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 28px 24px 36px; gap: 22px; position: relative; }
    .card { background: var(--card-bg); border-radius: var(--radius-card); border: 3px solid var(--card-border); box-shadow: var(--shadow-soft); max-width: 1100px; width: 100%; padding: 22px 38px 28px; }
    .card h1 { font-size: 34px; margin-bottom: 10px; font-weight: 800; color: #2c3e50; }
    .card p { font-size: 22px; line-height: 1.6; }
    .bullets { margin-top: 10px; padding-left: 22px; font-size: 22px; line-height: 1.9; }
    .bullets li { margin: 4px 0; }
    .graph-row { display: flex; gap: 60px; justify-content: center; align-items: flex-start; max-width: 1100px; width: 100%; flex-wrap: wrap; }
    .graph-cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .graph-label { font-size: 26px; font-weight: 700; color: #2c3e50; align-self: flex-start; }
    /* Inline worked box (beside a graph) */
    .worked-box-inline { background: #fff; border-radius: var(--radius-card); border: 3px solid #27ae60; box-shadow: var(--shadow-soft); flex: 1; min-width: 400px; max-width: 580px; padding: 24px 44px 32px; align-self: flex-start; }
    .worked-box-inline h2 { font-size: 26px; font-weight: 800; color: #166534; margin-bottom: 16px; }
    .worked-box-inline p { font-size: 20px; line-height: 1.7; }
    /* Full-width worked box */
    .worked-box { background: #fff; border-radius: var(--radius-card); border: 3px solid #27ae60; box-shadow: var(--shadow-soft); max-width: 1100px; width: 100%; padding: 24px 50px 32px; }
    .worked-box h2 { font-size: 26px; font-weight: 800; color: #166534; margin-bottom: 16px; }
    .coord-row { display: flex; gap: 120px; justify-content: center; max-width: 1100px; width: 100%; flex-wrap: wrap; }
    .coord-cell { display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }
    .coord-label { font-size: 28px; font-weight: 700; color: #2c3e50; }
    .coord-pair { font-family: "Times New Roman", Times, serif; font-size: 42px; color: #1a1a1a; }
    .mwb-header { background: #fff7ed; border: 3px solid #f59e0b; border-radius: 14px; padding: 14px 28px; max-width: 1100px; width: 100%; display: flex; align-items: center; gap: 18px; }
    .mwb-header h2 { font-size: 28px; font-weight: 900; color: #c2410c; }
    .timer-widget { position: absolute; left: 24px; top: 100px; width: 262px; background: #111; color: #fff; border-radius: 14px; padding: 18px 16px 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.18); border: 3px solid #0ea5e9; user-select: none; z-index: 5; cursor: grab; }
    .timer-widget:active { cursor: grabbing; }
    .timer-display { font-family: ui-monospace, monospace; font-size: 54px; letter-spacing: 2px; text-align: center; margin-bottom: 12px; }
    .timer-controls { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
    .timer-btn { background: #2d9cdb; color: #fff; border: none; border-radius: 10px; padding: 8px 12px; font-weight: 800; cursor: pointer; font-size: 15px; }
    .timer-btn:active { transform: translateY(1px); }
    .timer-inputs { display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 700; }
    .timer-inputs label { display: flex; align-items: center; gap: 5px; font-size: 14px; }
    .timer-inputs input { width: 54px; padding: 6px 8px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.25); font-weight: 800; text-align: center; background: #fff; color: #111; font-size: 15px; }
    #drawCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .hidden { display: none; }
    .toolbar { background: var(--bottom-bar-bg); color: var(--text-muted); padding: 10px 14px; display: flex; align-items: center; gap: 10px; font-size: 13px; flex-wrap: wrap; }
    .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .tool-button, .pill-button { border: none; outline: none; cursor: pointer; font: inherit; display: inline-flex; align-items: center; justify-content: center; white-space: nowrap; }
    .tool-button { width: 38px; height: 38px; border-radius: 10px; background: #1f4b6f; color: #ecf0f1; box-shadow: 0 2px 6px rgba(0,0,0,0.35); }
    .tool-button.square-active { width: 42px; border-radius: 12px; background: var(--toolbar-icon-bg); color: #2c3e50; border: 2px solid var(--toolbar-icon-border); font-size: 18px; }
    .tool-button.circle { border-radius: 50%; }
    .tool-button.disabled { opacity: 0.4; cursor: default; pointer-events: none; }
    .tool-button.active { box-shadow: 0 0 0 2px #f1c40f, 0 2px 6px rgba(0,0,0,0.35); }
    .pill-button { padding: 8px 16px; border-radius: var(--radius-pill); font-weight: 700; box-shadow: 0 2px 6px rgba(0,0,0,0.35); font-size: 14px; }
    .pill-blue { background: var(--pill-blue); color: #ecf0f1; }
    .pill-red { background: var(--pill-red); color: #fff; }
    .pill-green { background: var(--pill-green); color: #ecf0f1; }
    .toolbar-spacer { flex: 1; }
    /* colour helpers */
    .col-blue  { color: #1a73e8; font-weight: 800; }
    .col-green { color: #1a7a34; font-weight: 800; }
    .col-red   { color: #c0392b; font-weight: 800; }
    /* subscript label rows */
    .sub-label-row { display: inline-flex; flex-direction: column; align-items: center; line-height: 1.1; }
    .sub-label-row .sub-val  { font-family: "Times New Roman", serif; font-size: 36px; font-weight: 700; }
    .sub-label-row .sub-name { font-size: 15px; font-weight: 800; color: #c0392b; margin-top: 2px; }
    /* HTML fraction (colour-coded, slide 1) */
    .html-frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; line-height: 1.1; font-family: "Times New Roman", serif; font-weight: 700; }
    .html-frac .num { padding: 0 10px 4px; border-bottom: 3px solid #333; }
    .html-frac .den { padding: 4px 10px 0; }
  </style>
  <!-- MathJax with color extension -->
  <script>
    window.MathJax = {
      loader: { load: ['[tex]/color'] },
      tex: {
        inlineMath: [['\\(','\\)'],['$','$']],
        packages: { '[+]': ['color'] }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
  <header class="top-bar">
    <div class="top-left">
      <div class="meta-row"><span class="meta-label">Date:</span><span class="meta-value">03/03/2026</span></div>
      <div class="meta-row"><span class="meta-label">Title:</span><span class="meta-value">Finding the Gradient of a Straight Line</span></div>
    </div>
    <div class="top-right">
      <span class="page-info" id="pageInfo">Slide 1 of 12</span>
      <div class="slide-select-wrapper"><select class="slide-select" id="slideSelect"></select></div>
    </div>
  </header>

  <main class="content" id="mainContent">
    <div id="timerWidget" class="timer-widget hidden">
      <div id="timerDisplay" class="timer-display">01:00</div>
      <div class="timer-controls">
        <button id="timerStart" class="timer-btn">Start</button>
        <button id="timerPause" class="timer-btn">Pause</button>
        <button id="timerReset" class="timer-btn">Reset</button>
      </div>
      <div class="timer-inputs">
        <label>Min: <input id="timerMin" type="number" min="0" max="999" value="1"></label>
        <label>Sec: <input id="timerSec" type="number" min="0" max="59" value="0"></label>
      </div>
    </div>
    <div id="slideMount" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:22px;"></div>
    <canvas id="drawCanvas"></canvas>
  </main>

  <footer class="toolbar">
    <div class="toolbar-left">
      <button id="fullscreenBtn" class="tool-button square-active">⤢</button>
      <button id="prevBtn" class="tool-button disabled">←</button>
      <button id="nextBtn" class="tool-button">→</button>
      <button id="penBtn" class="tool-button circle">✏️</button>
      <button id="greenBtn" class="tool-button circle">🟢</button>
      <button id="redBtn" class="tool-button circle">🔴</button>
      <button id="eraserBtn" class="tool-button circle">⚪</button>
      <button id="penSizeBtn" class="pill-button pill-blue">Pen size: Medium ▾</button>
      <button id="eraserSizeBtn" class="pill-button pill-blue">Eraser size: Medium ▾</button>
      <button id="clearBtn" class="pill-button pill-red">Clear</button>
    </div>
    <div class="toolbar-spacer"></div>
    <div class="toolbar-right">
      <button class="pill-button pill-green">🖨 Print</button>
    </div>
  </footer>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    // SVG HELPERS  (UNIT=30, grid x∈[-2,8] y∈[-2,8])
    // ─────────────────────────────────────────────────────────────────────────
    const UNIT=30, OX=96, OY=258;
    function sx(cx){ return OX + cx*UNIT; }
    function sy(cy){ return OY - cy*UNIT; }
    const W_SVG = sx(8)+34, H_SVG = sy(-2)+32;

    function clipLine(x1,y1,x2,y2){
      const dx=x2-x1, dy=y2-y1;
      let tmin=-1e9, tmax=1e9;
      if(dx!==0){ const a=(-2-x1)/dx, b=(8-x1)/dx; tmin=Math.max(tmin,Math.min(a,b)); tmax=Math.min(tmax,Math.max(a,b)); }
      if(dy!==0){ const a=(-2-y1)/dy, b=(8-y1)/dy; tmin=Math.max(tmin,Math.min(a,b)); tmax=Math.min(tmax,Math.max(a,b)); }
      return { x1:sx(x1+tmin*dx), y1:sy(y1+tmin*dy), x2:sx(x1+tmax*dx), y2:sy(y1+tmax*dy) };
    }

    function axes(){
      return `
        <line x1="${sx(-2)-6}" y1="${OY}" x2="${sx(8)+20}" y2="${OY}" stroke="#222" stroke-width="2.2"/>
        <polygon points="${sx(8)+20},${OY} ${sx(8)+9},${OY-5} ${sx(8)+9},${OY+5}" fill="#222"/>
        <line x1="${OX}" y1="${sy(-2)+6}" x2="${OX}" y2="${sy(8)-20}" stroke="#222" stroke-width="2.2"/>
        <polygon points="${OX},${sy(8)-20} ${OX-5},${sy(8)-9} ${OX+5},${sy(8)-9}" fill="#222"/>
        <text x="${OX-14}" y="${OY+21}" font-size="14" fill="#555">O</text>
        <text x="${sx(8)+26}" y="${OY+7}" font-size="18" font-style="italic" fill="#222">x</text>
        <text x="${OX+7}" y="${sy(8)-22}" font-size="18" font-style="italic" fill="#222">y</text>`;
    }

    function grid(){
      let g='', n='';
      for(let i=-2;i<=8;i++){
        g+=`<line x1="${sx(i)}" y1="${sy(8)}" x2="${sx(i)}" y2="${sy(-2)}" stroke="#ccc" stroke-width="1"/>`;
        g+=`<line x1="${sx(-2)}" y1="${sy(i)}" x2="${sx(8)}" y2="${sy(i)}" stroke="#ccc" stroke-width="1"/>`;
      }
      for(let i=-2;i<=8;i++){
        if(i===0) continue;
        n+=`<text x="${sx(i)}" y="${OY+21}" text-anchor="middle" font-size="14" fill="#444">${i}</text>`;
        n+=`<text x="${OX-20}" y="${sy(i)+5}" text-anchor="middle" font-size="14" fill="#444">${i}</text>`;
      }
      return g+n;
    }

    // Full grid graph (Q1 style) — id must be unique across all SVGs on the page
    function gridSVG(lx1,ly1,lx2,ly2,id, extras=''){
      const cl=clipLine(lx1,ly1,lx2,ly2);
      return `<svg width="${W_SVG}" height="${H_SVG}" viewBox="0 0 ${W_SVG} ${H_SVG}" style="display:block;overflow:visible;">
        <defs><clipPath id="cp${id}"><rect x="${sx(-2)}" y="${sy(8)}" width="${10*UNIT}" height="${10*UNIT}"/></clipPath></defs>
        ${grid()}${axes()}
        <line x1="${cl.x1}" y1="${cl.y1}" x2="${cl.x2}" y2="${cl.y2}" stroke="#e74c3c" stroke-width="3.2" clip-path="url(#cp${id})"/>
        ${extras}
      </svg>`;
    }

    // Axes-only graph with labelled points (Q6 style)
    function axesSVG(lx1,ly1,lx2,ly2,pts,id){
      const cl=clipLine(lx1,ly1,lx2,ly2);
      let p='';
      pts.forEach(pt=>{
        const px=sx(pt.x), py=sy(pt.y), s=7;
        p+=`<line x1="${px-s}" y1="${py-s}" x2="${px+s}" y2="${py+s}" stroke="#2980b9" stroke-width="2.8"/>`;
        p+=`<line x1="${px+s}" y1="${py-s}" x2="${px-s}" y2="${py+s}" stroke="#2980b9" stroke-width="2.8"/>`;
        const lbx = pt.x>=3 ? px-14 : px+14;
        const lby = pt.y>=3 ? py-12 : py+23;
        const anch = pt.x>=3 ? 'end' : 'start';
        p+=`<text x="${lbx}" y="${lby}" text-anchor="${anch}" font-size="16" font-weight="700" fill="#2980b9">${pt.label} (${pt.x}, ${pt.y})</text>`;
      });
      return `<svg width="${W_SVG}" height="${H_SVG}" viewBox="0 0 ${W_SVG} ${H_SVG}" style="display:block;overflow:visible;">
        <defs><clipPath id="cp${id}"><rect x="${sx(-2)}" y="${sy(8)}" width="${10*UNIT}" height="${10*UNIT}"/></clipPath></defs>
        ${axes()}
        <line x1="${cl.x1}" y1="${cl.y1}" x2="${cl.x2}" y2="${cl.y2}" stroke="#e74c3c" stroke-width="3.2" clip-path="url(#cp${id})"/>
        ${p}
      </svg>`;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // SLIDE 1 annotated graph:
    //   Line through (-1,-1) and (4,9)  — passes through (0,1) and (2,5)
    //   Blue dashed vertical:   (2,1)→(2,5)  "change in y = 4"
    //   Green dashed horizontal: (0,1)→(2,1)  "change in x = 2"
    // ─────────────────────────────────────────────────────────────────────────
    function slide1Graph(){
      const cl  = clipLine(-1,-1,4,9);
      const vx  = sx(2), vy1=sy(1), vy5=sy(5);
      const hx0 = sx(0), hx2=sx(2), hy1=sy(1);
      return `<svg width="${W_SVG}" height="${H_SVG}" viewBox="0 0 ${W_SVG} ${H_SVG}" style="display:block;overflow:visible;">
        <defs><clipPath id="cps1ann"><rect x="${sx(-2)}" y="${sy(8)}" width="${10*UNIT}" height="${10*UNIT}"/></clipPath></defs>
        ${grid()}${axes()}
        <!-- main red line -->
        <line x1="${cl.x1}" y1="${cl.y1}" x2="${cl.x2}" y2="${cl.y2}" stroke="#e74c3c" stroke-width="3.2" clip-path="url(#cps1ann)"/>
        <!-- BLUE vertical line (2,1)→(2,5) -->
        <line x1="${vx}" y1="${vy1}" x2="${vx}" y2="${vy5}" stroke="#1a73e8" stroke-width="3.5" stroke-dasharray="8,5"/>
        <polygon points="${vx},${vy5} ${vx-6},${vy5+12} ${vx+6},${vy5+12}" fill="#1a73e8"/>
        <!-- blue label right of line -->
        <text x="${vx+12}" y="${(vy1+vy5)/2+6}" font-size="15" font-weight="800" fill="#1a73e8">change in y = 4</text>
        <!-- GREEN horizontal line (0,1)→(2,1) -->
        <line x1="${hx0}" y1="${hy1}" x2="${hx2}" y2="${hy1}" stroke="#1a7a34" stroke-width="3.5" stroke-dasharray="8,5"/>
        <polygon points="${hx2},${hy1} ${hx2-12},${hy1-6} ${hx2-12},${hy1+6}" fill="#1a7a34"/>
        <!-- green label below line -->
        <text x="${(hx0+hx2)/2}" y="${hy1+28}" text-anchor="middle" font-size="15" font-weight="800" fill="#1a7a34">change in x = 2</text>
        <!-- anchor dots -->
        <circle cx="${sx(0)}" cy="${sy(1)}" r="5" fill="#555"/>
        <circle cx="${sx(2)}" cy="${sy(5)}" r="5" fill="#555"/>
        <circle cx="${sx(2)}" cy="${sy(1)}" r="5" fill="#555"/>
      </svg>`;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // HTML colour-coded fraction for Slide 1 worked example
    // ─────────────────────────────────────────────────────────────────────────
    function colorFrac(num, den, ans, numCol, denCol, ansCol){
      return `<span style="display:inline-flex;align-items:center;gap:14px;font-family:'Times New Roman',serif;font-size:38px;font-weight:700;vertical-align:middle;">
        <span class="html-frac">
          <span class="num" style="color:${numCol};">${num}</span>
          <span class="den" style="color:${denCol};">${den}</span>
        </span>
        <span style="color:#222;">=</span>
        <span style="color:${ansCol};font-size:44px;">${ans}</span>
      </span>`;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // REUSABLE MWB LAYOUT
    // ─────────────────────────────────────────────────────────────────────────
    function mwbLayout(questionHtml, graphsHtml){
      return `
        <div class="mwb-header"><h2>✋ Mini Whiteboard — 1 minute</h2></div>
        <section class="card"><h1>${questionHtml}</h1></section>
        ${graphsHtml}`;
    }

    // ─────────────────────────────────────────────────────────────────────────
    // SLIDES  (12 total)
    // ─────────────────────────────────────────────────────────────────────────
    const slides = [

      // ════════════════════════════════
      // SECTION 1: GRADIENT FROM A GRID
      // ════════════════════════════════

      // SLIDE 1 — Core Knowledge
      { timer:null, title:"Core Knowledge – Gradient from a Graph",
        render:()=>`
          <section class="card">
            <h1>Core Knowledge: The Gradient</h1>
            <ul class="bullets">
              <li>The gradient is found by <strong>counting the squares</strong> on the graph.</li>
              <li>Count how many squares the line goes <span class="col-blue">up</span> — this is the <span class="col-blue">change in y</span>.</li>
              <li>Count how many squares the line goes <span class="col-green">across</span> — this is the <span class="col-green">change in x</span>.</li>
              <li>A <strong>positive</strong> gradient slopes up ↗ &nbsp;·&nbsp; A <strong>negative</strong> gradient slopes down ↘</li>
            </ul>
          </section>
          <div style="display:flex;gap:50px;align-items:flex-start;justify-content:center;max-width:1100px;width:100%;flex-wrap:wrap;">
            <div class="graph-cell">
              <span class="graph-label">Example</span>
              ${slide1Graph()}
            </div>
            <section class="worked-box-inline">
              <h2>Worked Example</h2>
              <p style="margin-bottom:16px;">Count the squares between two clear grid intersection points.</p>
              <div style="font-size:22px;line-height:2.4;margin-bottom:20px;">
                <span class="col-blue">Change in y = 4 squares up</span><br>
                <span class="col-green">Change in x = 2 squares across</span>
              </div>
              <div style="font-size:22px;margin-bottom:8px;">Gradient =</div>
              <div style="margin-left:16px;margin-bottom:16px;">
                ${colorFrac('4','2','2','#1a73e8','#1a7a34','#1a7a34')}
              </div>
              <div style="font-size:20px;color:#555;">
                The <span class="col-blue">top number</span> counts squares <span class="col-blue">up</span>.<br>
                The <span class="col-green">bottom number</span> counts squares <span class="col-green">across</span>.
              </div>
            </section>
          </div>`
      },

      // SLIDE 2 — Examples
      { timer:null, title:"Examples – Gradient from a Graph",
        render:()=>`
          <section class="card"><h1>Find the gradient of the following straight lines.</h1></section>
          <div class="graph-row">
            <div class="graph-cell">
              <span class="graph-label">Question 1</span>
              ${gridSVG(-1,0,4,5,'s2a')}
            </div>
            <div class="graph-cell">
              <span class="graph-label">Question 2</span>
              ${gridSVG(0,-2,2,4,'s2b')}
            </div>
          </div>`
      },

      // SLIDE 3 — Mini Whiteboard A (grid)
      { timer:{min:1,sec:0}, title:"Mini Whiteboard A – Gradient from a Graph",
        render:()=> mwbLayout(
          'Find the gradient of the following straight lines.',
          `<div class="graph-row">
            <div class="graph-cell"><span class="graph-label">Q1</span>${gridSVG(-2,1,8,6,'s3a')}</div>
            <div class="graph-cell"><span class="graph-label">Q2</span>${gridSVG(0,8,4,0,'s3b')}</div>
          </div>`)
      },

      // SLIDE 4 — Mini Whiteboard B (grid)
      { timer:{min:1,sec:0}, title:"Mini Whiteboard B – Gradient from a Graph",
        render:()=> mwbLayout(
          'Find the gradient of the following straight lines.',
          `<div class="graph-row">
            <div class="graph-cell"><span class="graph-label">Q1</span>${gridSVG(0,3,4,7,'s4a')}</div>
            <div class="graph-cell"><span class="graph-label">Q2</span>${gridSVG(-1,7,3,-1,'s4b')}</div>
          </div>`)
      },

      // ══════════════════════════════════════
      // SECTION 2: GRADIENT FROM LABELLED POINTS
      // ══════════════════════════════════════

      // SLIDE 5 — Core Knowledge: labelled points
      { timer:null, title:"Core Knowledge – Gradient from Labelled Points",
        render:()=>`
          <section class="card">
            <h1>Core Knowledge: Gradient from Two Labelled Points</h1>
            <p>The gradient of a line can also be found using <strong>two labelled points</strong> on the line.</p>
            <div style="text-align:center;margin-top:14px;font-size:26px;">
              \\(\\text{Gradient} = \\dfrac{y_2 - y_1}{x_2 - x_1}\\)
            </div>
          </section>
          <div style="display:flex;gap:50px;align-items:flex-start;justify-content:center;max-width:1100px;width:100%;flex-wrap:wrap;">
            <div class="graph-cell">
              <span class="graph-label">Example</span>
              ${axesSVG(1,2,5,6,[{x:1,y:2,label:'A'},{x:5,y:6,label:'B'}],'s5e')}
            </div>
            <section class="worked-box-inline">
              <h2>Worked Example</h2>
              <!-- labelled coordinates -->
              <div style="display:flex;gap:48px;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px;font-family:'Times New Roman',serif;">
                <!-- Point A -->
                <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
                  <span style="font-size:26px;font-weight:700;">A (1, 2)</span>
                  <div style="display:flex;gap:24px;font-size:17px;font-weight:800;color:#c0392b;">
                    <span>x₁</span><span>y₁</span>
                  </div>
                </div>
                <!-- Point B -->
                <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
                  <span style="font-size:26px;font-weight:700;">B (5, 6)</span>
                  <div style="display:flex;gap:24px;font-size:17px;font-weight:800;color:#c0392b;">
                    <span>x₂</span><span>y₂</span>
                  </div>
                </div>
              </div>
              <!-- aligned working -->
              <div style="font-size:22px;line-height:1;">
                \\(\\begin{aligned}
                  \\text{Gradient} &= \\dfrac{y_2 - y_1}{x_2 - x_1} \\\\[14pt]
                                  &= \\dfrac{6 - 2}{5 - 1} \\\\[14pt]
                                  &= \\dfrac{4}{4} \\\\[10pt]
                                  &= \\mathbf{1}

      },

      // SLIDE 6 — Examples: labelled points
      { timer:null, title:"Examples – Gradient from Labelled Points",
        render:()=>`
          <section class="card"><h1>Find the gradient of the following straight lines.</h1></section>
          <div class="graph-row">
            <div class="graph-cell">

            <div class="graph-cell">

              ${axesSVG(-1,5,3,-3,[{x:-1,y:5,label:'A'},{x:3,y:-3,label:'B'}],'s6b')}

      },

      // SLIDE 7 — Mini Whiteboard A (labelled points)
      { timer:{min:1,sec:0}, title:"Mini Whiteboard A – Gradient from Labelled Points",
        render:()=> mwbLayout(
          'Find the gradient of the following straight lines.',
          `<div class="graph-row">
            <div class="graph-cell"><span class="graph-label">Q1</span>${axesSVG(0,1,6,7,[{x:0,y:1,label:'A'},{x:6,y:7,label:'B'}],'s7a')}</div>
            <div class="graph-cell"><span class="graph-label">Q2</span>${axesSVG(-2,7,2,-1,[{x:-2,y:7,label:'A'},{x:2,y:-1,label:'B'}],'s7b')}</div>

      // SLIDE 8 — Mini Whiteboard B (labelled points)
      { timer:{min:1,sec:0}, title:"Mini Whiteboard B – Gradient from Labelled Points",
        render:()=> mwbLayout(
          'Find the gradient of the following straight lines.',
          `<div class="graph-row">
            <div class="graph-cell"><span class="graph-label">Q1</span>${axesSVG(1,0,5,8,[{x:1,y:0,label:'A'},{x:5,y:8,label:'B'}],'s8a')}</div>
            <div class="graph-cell"><span class="graph-label">Q2</span>${axesSVG(-3,6,3,-6,[{x:-3,y:6,label:'A'},{x:3,y:-6,label:'B'}],'s8b')}</div>
          </div>`)
      },

      // ══════════════════════════════════════
      // SECTION 3: GRADIENT FROM COORDINATE PAIRS
      // ══════════════════════════════════════

      // SLIDE 9 — Core Knowledge: coordinate pairs
      { timer:null, title:"Core Knowledge – Gradient from Coordinate Pairs",
        render:()=>`
          <section class="card">
            <h1>Core Knowledge: Gradient from Coordinate Pairs</h1>
            <ul class="bullets">
              <li>You can find the gradient using only <strong>two coordinate pairs</strong> — no graph needed.</li>
              <li>\\(\\text{Gradient} = \\dfrac{y_2 - y_1}{x_2 - x_1}\\)</li>
              <li>Be careful with <strong>negative numbers</strong> — use brackets when substituting.</li>
            </ul>
          </section>
          <div style="display:flex;gap:50px;align-items:flex-start;justify-content:center;max-width:1100px;width:100%;flex-wrap:wrap;">
            <!-- labelled example coordinates -->
            <div style="display:flex;flex-direction:column;gap:14px;align-items:center;padding-top:10px;">
              <span style="font-size:24px;font-weight:700;color:#2c3e50;">Example</span>
              <div style="font-size:22px;text-align:center;line-height:2;">
                Find the gradient of the line through
              </div>
              <div style="display:flex;gap:48px;align-items:flex-start;justify-content:center;flex-wrap:wrap;font-family:'Times New Roman',serif;">
                <!-- Point 1 -->
                <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
                  <span style="font-size:34px;font-weight:700;">(2, 1)</span>
                  <div style="display:flex;gap:24px;font-size:17px;font-weight:800;color:#c0392b;font-family:system-ui,sans-serif;">
                    <span>x₁</span><span>y₁</span>
                  </div>
                </div>
                <span style="font-size:26px;font-weight:700;padding-top:6px;">and</span>
                <!-- Point 2 -->
                <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
                  <span style="font-size:34px;font-weight:700;">(5, 7)</span>
                  <div style="display:flex;gap:24px;font-size:17px;font-weight:800;color:#c0392b;font-family:system-ui,sans-serif;">
                    <span>x₂</span><span>y₂</span>
                  </div>
                </div>
              </div>
            </div>
            <!-- aligned worked example -->
            <section class="worked-box-inline">
              <h2>Worked Example</h2>
              <div style="font-size:22px;line-height:1;">
                \\(\\begin{aligned}
                  \\text{Gradient} &= \\dfrac{y_2 - y_1}{x_2 - x_1} \\\\[14pt]
                                  &= \\dfrac{7 - 1}{5 - 2} \\\\[14pt]
                                  &= \\dfrac{6}{3} \\\\[10pt]

      // SLIDE 10 — Examples: coordinate pairs
      { timer:null, title:"Examples – Gradient from Coordinate Pairs",
        render:()=>`
          <section class="card"><h1>Find the gradient of the following two points.</h1></section>
          <div class="coord-row" style="margin-top:16px;">
            <div class="coord-cell">
              <span class="coord-label">Question 1</span>
              <div class="coord-pair">(1,&nbsp;4)&nbsp; and &nbsp;(3,&nbsp;10)</div>
            </div>
            <div class="coord-cell">
              <span class="coord-label">Question 2</span>
              <div class="coord-pair">(0,&nbsp;5)&nbsp; and &nbsp;(4,&nbsp;&#8722;3)</div>

          </div>`
      },

      // SLIDE 11 — Mini Whiteboard A (coordinate pairs)
      { timer:{min:1,sec:0}, title:"Mini Whiteboard A – Gradient from Coordinate Pairs",
        render:()=> mwbLayout(
          'Find the gradient of the following two points.',
          `<div class="coord-row" style="margin-top:16px;">
            <div class="coord-cell">
              <span class="coord-label">Q1</span>
              <div class="coord-pair">(&#8722;5,&nbsp;&#8722;9)&nbsp; and &nbsp;(1,&nbsp;3)</div>
            </div>
            <div class="coord-cell">
              <span class="coord-label">Q2</span>
              <div class="coord-pair">(&#8722;3,&nbsp;8)&nbsp; and &nbsp;(4,&nbsp;&#8722;6)</div>
            </div>
          </div>`)
      },

      // SLIDE 12 — Mini Whiteboard B (coordinate pairs)
      { timer:{min:1,sec:0}, title:"Mini Whiteboard B – Gradient from Coordinate Pairs",
        render:()=> mwbLayout(
          'Find the gradient of the following two points.',
          `<div class="coord-row" style="margin-top:16px;">
            <div class="coord-cell">
              <span class="coord-label">Q1</span>
              <div class="coord-pair">(&#8722;8,&nbsp;6)&nbsp; and &nbsp;(0,&nbsp;&#8722;2)</div>
            </div>
            <div class="coord-cell">
              <span class="coord-label">Q2</span>
              <div class="coord-pair">(&#8722;2,&nbsp;9)&nbsp; and &nbsp;(4,&nbsp;7)</div>
            </div>
          </div>`)
      }

    ]; // end slides

    // ─────────────────────────────────────────────────────────────────────────
    // NAVIGATION
    // ─────────────────────────────────────────────────────────────────────────
    const slideMount   = document.getElementById('slideMount');
    const slideSelect  = document.getElementById('slideSelect');
    const pageInfo     = document.getElementById('pageInfo');
    const prevBtn      = document.getElementById('prevBtn');
    const nextBtn      = document.getElementById('nextBtn');
    const timerWidget  = document.getElementById('timerWidget');
    const timerDisplay = document.getElementById('timerDisplay');
    const timerStartBtn= document.getElementById('timerStart');
    const timerPauseBtn= document.getElementById('timerPause');
    const timerResetBtn= document.getElementById('timerReset');
    const timerMinInput= document.getElementById('timerMin');
    const timerSecInput= document.getElementById('timerSec');
    const maxSlide = slides.length - 1;
    let currentSlide = 0;

    slides.forEach((s,i)=>{
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = `Slide ${i+1}: ${s.title}`;
      slideSelect.appendChild(opt);
    });

    function updateNavUI(){
      prevBtn.classList.toggle('disabled', currentSlide===0);
      nextBtn.classList.toggle('disabled', currentSlide===maxSlide);
      pageInfo.textContent = `Slide ${currentSlide+1} of ${maxSlide+1}`;
      slideSelect.value = String(currentSlide);
    }

    function renderSlide(){
      const t = slides[currentSlide].timer;
      if(t){ timerWidget.classList.remove('hidden'); setTimerTo(t.min,t.sec); }
      else { timerWidget.classList.add('hidden'); pauseTimer(); }
      slideMount.innerHTML = slides[currentSlide].render();
      if(window.MathJax?.typesetPromise) MathJax.typesetPromise([slideMount]);
      updateNavUI(); resizeCanvas(); restoreDrawingForSlide(currentSlide);
    }

    function changeSlideTo(target){
      if(target<0 || target>maxSlide) return;
      saveCurrentSlideDrawing(); currentSlide=target; renderSlide();
    }

    prevBtn.addEventListener('click', ()=>changeSlideTo(currentSlide-1));
    nextBtn.addEventListener('click', ()=>changeSlideTo(currentSlide+1));
    slideSelect.addEventListener('change', e=>changeSlideTo(parseInt(e.target.value,10)||0));
    document.addEventListener('keydown', e=>{
      if(e.key==='ArrowLeft') { e.preventDefault(); changeSlideTo(currentSlide-1); }
      if(e.key==='ArrowRight'){ e.preventDefault(); changeSlideTo(currentSlide+1); }
    });
    document.getElementById('fullscreenBtn').addEventListener('click', ()=>{
      if(!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });

    // ─────────────────────────────────────────────────────────────────────────
    // DRAWING CANVAS
    // ─────────────────────────────────────────────────────────────────────────
    const canvas    = document.getElementById('drawCanvas');
    const contentEl = document.getElementById('mainContent');
    const ctx       = canvas.getContext('2d');
    const penBtn    = document.getElementById('penBtn');
    const greenBtn  = document.getElementById('greenBtn');
    const redBtn    = document.getElementById('redBtn');
    const eraserBtn = document.getElementById('eraserBtn');
    const penSizeBtn    = document.getElementById('penSizeBtn');
    const eraserSizeBtn = document.getElementById('eraserSizeBtn');
    const clearBtn  = document.getElementById('clearBtn');
    let drawingEnabled=false, isDrawing=false, currentTool='pen', currentColor='#111111';
    const slideDrawings = new Array(slides.length).fill(null);
    const penSizes    = [{label:'Small',value:3},{label:'Medium',value:6},{label:'Large',value:12}];
    const eraserSizes = [{label:'Small',value:14},{label:'Medium',value:28},{label:'Large',value:56}];
    let penSizeIndex=1, eraserSizeIndex=1;
    function updateSizeLabels(){
      penSizeBtn.textContent    = `Pen size: ${penSizes[penSizeIndex].label} ▾`;
      eraserSizeBtn.textContent = `Eraser size: ${eraserSizes[eraserSizeIndex].label} ▾`;
    }
    updateSizeLabels();
    function enableDrawing(e){ drawingEnabled=e; canvas.style.pointerEvents=e?'auto':'none'; }
    function setActiveTool(btn){ [penBtn,greenBtn,redBtn,eraserBtn].forEach(b=>b.classList.remove('active')); if(btn) btn.classList.add('active'); }
    penBtn.addEventListener('click',   ()=>{ currentTool='pen'; currentColor='#111111'; enableDrawing(true); setActiveTool(penBtn); });
    greenBtn.addEventListener('click', ()=>{ currentTool='pen'; currentColor='#27ae60'; enableDrawing(true); setActiveTool(greenBtn); });
    redBtn.addEventListener('click',   ()=>{ currentTool='pen'; currentColor='#e74c3c'; enableDrawing(true); setActiveTool(redBtn); });
    eraserBtn.addEventListener('click',()=>{ currentTool='eraser'; enableDrawing(true); setActiveTool(eraserBtn); });
    penSizeBtn.addEventListener('click',   ()=>{ penSizeIndex=(penSizeIndex+1)%penSizes.length; updateSizeLabels(); });
    eraserSizeBtn.addEventListener('click',()=>{ eraserSizeIndex=(eraserSizeIndex+1)%eraserSizes.length; updateSizeLabels(); });
    clearBtn.addEventListener('click', ()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); slideDrawings[currentSlide]=null; });
    function clearCanvas(){ ctx.clearRect(0,0,canvas.width,canvas.height); }
    function saveCurrentSlideDrawing(){ slideDrawings[currentSlide]=canvas.toDataURL('image/png'); }
    function restoreDrawingForSlide(idx){
      ctx.globalCompositeOperation='source-over'; clearCanvas();
      const d=slideDrawings[idx]; if(!d) return;
      const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0,canvas.width,canvas.height); img.src=d;
    }
    function resizeCanvas(){ const r=contentEl.getBoundingClientRect(); canvas.width=r.width; canvas.height=r.height; restoreDrawingForSlide(currentSlide); }
    window.addEventListener('resize', resizeCanvas);
    function startDraw(x,y){ if(!drawingEnabled)return; isDrawing=true; ctx.beginPath(); ctx.moveTo(x,y); }
    function drawLine(x,y){
      if(!isDrawing) return;
      ctx.lineCap='round'; ctx.lineJoin='round';
      if(currentTool==='eraser'){ ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=eraserSizes[eraserSizeIndex].value; }
      else { ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=currentColor; ctx.lineWidth=penSizes[penSizeIndex].value; }
      ctx.lineTo(x,y); ctx.stroke();
    }
    function stopDraw(){ if(!isDrawing)return; isDrawing=false; ctx.closePath(); saveCurrentSlideDrawing(); }
    canvas.addEventListener('mousedown', e=>{ const r=canvas.getBoundingClientRect(); startDraw(e.clientX-r.left,e.clientY-r.top); });
    canvas.addEventListener('mousemove', e=>{ const r=canvas.getBoundingClientRect(); drawLine(e.clientX-r.left,e.clientY-r.top); });
    canvas.addEventListener('mouseup',    stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);
    canvas.addEventListener('touchstart', e=>{ const t=e.touches[0],r=canvas.getBoundingClientRect(); startDraw(t.clientX-r.left,t.clientY-r.top); e.preventDefault(); },{passive:false});
    canvas.addEventListener('touchmove',  e=>{ const t=e.touches[0],r=canvas.getBoundingClientRect(); drawLine(t.clientX-r.left,t.clientY-r.top); e.preventDefault(); },{passive:false});
    canvas.addEventListener('touchend',   stopDraw);
    canvas.addEventListener('touchcancel',stopDraw);

    // ─────────────────────────────────────────────────────────────────────────
    // TIMER
    // ─────────────────────────────────────────────────────────────────────────
    let timerInterval=null, timerRemainingSeconds=60, timerSetSeconds=60;
    function clamp(n,a,b){ return Math.min(b,Math.max(a,n)); }
    function pad2(n){ return String(n).padStart(2,'0'); }
    function renderTimerDisplay(){
      const m=Math.floor(timerRemainingSeconds/60), s=timerRemainingSeconds%60;
      timerDisplay.textContent=`${pad2(m)}:${pad2(s)}`;
    }
    function readInputs(){
      const min=clamp(parseInt(timerMinInput.value,10)||0,0,999);
      const sec=clamp(parseInt(timerSecInput.value,10)||0,0,59);
      timerMinInput.value=String(min); timerSecInput.value=String(sec);
      return min*60+sec;
    }
    function stopTimerInterval(){ if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } }
    function startTimer(){
      const inp=readInputs();
      if(timerRemainingSeconds===0||timerRemainingSeconds===timerSetSeconds){ timerSetSeconds=inp||0; timerRemainingSeconds=timerSetSeconds; }
      stopTimerInterval();
      timerInterval=setInterval(()=>{ if(timerRemainingSeconds>0){ timerRemainingSeconds--; renderTimerDisplay(); } else stopTimerInterval(); },1000);
      renderTimerDisplay();
    }
    function pauseTimer(){ stopTimerInterval(); }
    function resetTimer(){
      stopTimerInterval(); timerRemainingSeconds=timerSetSeconds;
      timerMinInput.value=String(Math.floor(timerSetSeconds/60));
      timerSecInput.value=String(timerSetSeconds%60);
      renderTimerDisplay();
    }
    function setTimerTo(min,sec){
      stopTimerInterval();
      min=clamp(parseInt(min,10)||0,0,999); sec=clamp(parseInt(sec,10)||0,0,59);
      timerMinInput.value=String(min); timerSecInput.value=String(sec);
      timerSetSeconds=min*60+sec; timerRemainingSeconds=timerSetSeconds;
      renderTimerDisplay();
    }
    timerStartBtn.addEventListener('click', startTimer);
    timerPauseBtn.addEventListener('click', pauseTimer);
    timerResetBtn.addEventListener('click', resetTimer);
    function onInputChange(){ const s=readInputs(); timerSetSeconds=s; if(!timerInterval){ timerRemainingSeconds=timerSetSeconds; renderTimerDisplay(); } }
    timerMinInput.addEventListener('input', onInputChange);
    timerSecInput.addEventListener('input', onInputChange);
    renderTimerDisplay();

    // Draggable timer widget
    (function(){
      const el=timerWidget; let dragging=false, offX=0, offY=0;
      el.addEventListener('mousedown', e=>{
        if(['input','button'].includes(e.target.tagName.toLowerCase())) return;
        dragging=true; const r=el.getBoundingClientRect(); offX=e.clientX-r.left; offY=e.clientY-r.top; e.preventDefault();
      });
      window.addEventListener('mousemove', e=>{
        if(!dragging) return;
        const pr=contentEl.getBoundingClientRect();
        let l=e.clientX-pr.left-offX, t=e.clientY-pr.top-offY;
        l=clamp(l,0,pr.width-el.offsetWidth); t=clamp(t,0,pr.height-el.offsetHeight);
        el.style.left=`${l}px`; el.style.top=`${t}px`;
      });
      window.addEventListener('mouseup', ()=>{ dragging=false; });
    })();

    // ── Start ──
    renderSlide();
  </script>
